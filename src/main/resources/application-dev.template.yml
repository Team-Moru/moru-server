spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://{HOST}:{PORT}/{DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: {USERNAME}
    password: {PASSWORD}
  jpa:
    hibernate:
      ddl-auto: {DDL_AUTO}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
