name: Discord PR Notify

on:
  pull_request:
    types: [opened, closed]   # 이 두 액션만 트리거됨

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            STATUS="🟢 PR Opened"
          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            STATUS="🟣 PR Merged"
          else
            STATUS="🔴 PR Closed"
          fi

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$STATUS — #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}\",
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"description\": \"by ${{ github.event.pull_request.user.login }}\"
              }]
            }" \
            "${{ secrets.DISCORD_WEBHOOK_SERVER }}"
